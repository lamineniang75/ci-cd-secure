# ============================================================================
# FICHIER: pyproject.toml (section Black)
# DESCRIPTION: Configuration Black pour formatage de code uniforme
# ============================================================================
[tool.black]
# Longueur maximale des lignes
line-length = 88

# Version Python minimale
target-version = ['py39', 'py310', 'py311', 'py312']

# Inclure ces fichiers
include = '\.pyi?$'

# Exclure ces répertoires
extend-exclude = '''
/(
  # Répertoires
  \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | migrations
  | node_modules
  | __pycache__
)/
'''

# Permettre les imports optimisés
skip-string-normalization = false

# Ajouter en-têtes de licence automatiquement (optionnel)
# preview = true

# ============================================================================
# UTILISATION
# ============================================================================
# black .                               # Formater tout le code
# black src/ tests/                     # Formater répertoires spécifiques
# black --check .                       # Vérifier sans modifier
# black --line-length 100 .             # Modifier la longueur des lignes
# ============================================================================

# ============================================================================
# INTÉGRATION AVEC D'AUTRES OUTILS
# ============================================================================
# Pour isort (tri des imports) - Assurez la compatibilité :
[tool.isort]
profile = "black"
line_length = 88
multi_line_mode = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_glob = ["*/migrations/*"]

# Pour Pylint - Désactiver les avertissements en conflit avec Black :
[tool.pylint.'MESSAGES CONTROL']
disable = "C0103"  # Invalid constant name (Black gère cela)

# Pour Mypy - Compatibilité avec Black :
[tool.mypy]
max_line_length = 88
warn_return_any = true
warn_unused_configs = true
# disallow_untyped_defs = true  # Trop strict pour commencer
ignore_missing_imports = true
