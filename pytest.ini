# ============================================================================
# FICHIER: pytest.ini
# DESCRIPTION: Configuration Pytest pour exécution des tests unitaires
# ============================================================================
[pytest]
# Répertoires de tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options de sortie
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Couverture de code (pytest-cov)
# Générer rapport XML et HTML
addopts = 
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=70

# Seuil de couverture minimal : 70%
# Augmentez à 80-90% selon les standards de sécurité

# Marqueurs personnalisés
markers =
    unit: tests unitaires isolés
    integration: tests d'intégration avec services externes
    slow: tests lents à exécuter
    security: tests de sécurité
    asyncio: tests asynchrones

# Timeout par défaut (en secondes)
timeout = 300

# Parallelisation (pytest-xdist)
# -n auto : utilise tous les CPU disponibles
# Décommenter pour paralléliser
# addopts = -n auto

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Fichier de configuration pour junitxml
junit_family = xunit2

# Plugins requis
# pip install pytest-cov pytest-xdist pytest-timeout
